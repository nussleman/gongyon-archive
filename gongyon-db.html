<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>공연 아카이브</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&family=Noto+Sans+KR:wght@300;400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e0e10;--bg2:#17171a;--bg3:#1f1f24;
  --line:rgba(255,255,255,0.08);--muted:rgba(255,255,255,0.35);--text:rgba(255,255,255,0.88);
  --accent:#c8a96e;--actor:#6eb5c8;--actor-bg:rgba(110,181,200,0.12);
  --staff:#c8a96e;--staff-bg:rgba(200,169,110,0.12);
}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;font-weight:300;min-height:100vh}

/* ── 레이아웃: 좌측 고정 nav + 우측 콘텐츠 ── */
.page-wrap{display:flex;min-height:100vh}

/* 좌측 고정 nav */
.left-nav{
  position:fixed;top:0;left:0;width:200px;height:100vh;
  background:var(--bg2);border-right:1px solid var(--line);
  display:flex;flex-direction:column;
  padding:1.6rem 0 1rem;
  z-index:100;
  overflow:visible;
}
.site-title{
  font-family:'Noto Serif KR',serif;font-weight:300;
  font-size:1.1rem;letter-spacing:0.06em;cursor:pointer;
  padding:0 1.4rem 1.4rem;border-bottom:1px solid var(--line);
  margin-bottom:0.6rem;
}
.site-title span{display:block;font-size:0.55em;letter-spacing:0.28em;color:var(--muted);margin-bottom:0.3rem;font-family:'Noto Sans KR',sans-serif}

/* 좌측 nav 메뉴 아이템 */
nav{display:flex;flex-direction:column;gap:0;padding:0.6rem 0 0.4rem}
nav button{
  background:none;border:none;border-left:2px solid transparent;
  color:var(--muted);font-family:'Noto Sans KR',sans-serif;
  font-size:0.82rem;letter-spacing:0.06em;
  padding:0.6rem 1.4rem;cursor:pointer;
  transition:color .15s,background .15s,border-color .15s;
  text-align:left;white-space:nowrap;
}
nav button:hover{color:var(--text);background:rgba(255,255,255,0.03)}
nav button.active{color:var(--text);border-left-color:var(--accent);background:rgba(200,169,110,0.06)}

/* 검색창을 nav 하단에 */
.left-nav .global-search{
  padding:0.7rem 1rem 0.8rem;
  margin-top:0;
  display:block;
  position:relative;
}
.left-nav .global-search input{
  font-size:0.78rem;
  padding:0.42rem 1.8rem 0.42rem 2rem;
  width:100%;
  background:var(--bg3);
  border:1px solid var(--line);
  border-radius:6px;
  color:var(--text);
  font-family:'Noto Sans KR',sans-serif;
  outline:none;
  transition:border-color .2s;
}
.left-nav .global-search input:focus{border-color:rgba(200,169,110,0.4);}
.left-nav .global-search input::placeholder{color:var(--muted)}
.left-nav .global-search .gs-icon{
  position:absolute;
  left:1.55rem;
  top:50%;
  transform:translateY(-50%);
  color:var(--muted);
  font-size:0.72rem;
  pointer-events:none;
  line-height:1;
}
.left-nav .global-search .gs-clear{
  position:absolute;
  right:1.4rem;
  top:50%;
  transform:translateY(-50%);
}
.left-nav .gs-dropdown{
  position:fixed;
  left:204px;
  top:4rem;
  width:300px;
  background:var(--bg2);
  border:1px solid var(--line);
  border-radius:8px;
  overflow:hidden;
  z-index:9999;
  box-shadow:0 8px 32px rgba(0,0,0,0.6);
  display:none;
  max-height:480px;
  overflow-y:auto;
  pointer-events:auto;
}
.left-nav .gs-dropdown.open{display:block}

/* 우측 콘텐츠 영역 */
.content-area{margin-left:200px;min-height:100vh;display:block;width:calc(100% - 200px);box-sizing:border-box}

/* 헤더(기존 aside 역할 제거, 상단 바 제거) */
header{display:none}

/* ── 전역 검색창 ── */
.global-search{position:relative;max-width:420px;width:100%;justify-self:center;}
.global-search input{width:100%;background:var(--bg2);border:1px solid var(--line);border-radius:6px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:0.83rem;padding:0.5rem 0.8rem 0.5rem 2.2rem;outline:none;transition:border-color .2s;}
.global-search input:focus{border-color:rgba(200,169,110,0.5);}
.global-search input::placeholder{color:var(--muted)}
.gs-icon{position:absolute;left:0.7rem;top:50%;transform:translateY(-50%);color:var(--muted);font-size:0.82rem;pointer-events:none}
.gs-clear{position:absolute;right:0.6rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:0.85rem;padding:0;display:none;line-height:1}
.gs-clear.vis{display:block}
.gs-dropdown{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--bg2);border:1px solid var(--line);border-radius:8px;overflow:hidden;z-index:200;box-shadow:0 8px 32px rgba(0,0,0,0.5);display:none;max-height:480px;overflow-y:auto;}
.gs-dropdown.open{display:block}
.gs-group-label{font-size:0.62rem;letter-spacing:0.2em;color:var(--muted);text-transform:uppercase;padding:0.7rem 1rem 0.3rem}
.gs-item{display:flex;align-items:center;gap:0.8rem;padding:0.55rem 1rem;cursor:pointer;transition:background .12s}
.gs-item:hover,.gs-item.focused{background:var(--bg3)}
.gs-item-icon{font-size:0.85rem;flex-shrink:0;width:1.2rem;text-align:center;opacity:0.7}
.gs-item-main{flex:1;min-width:0}
.gs-item-name{font-size:0.85rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gs-item-sub{font-size:0.7rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gs-divider{height:1px;background:var(--line);margin:0.2rem 0}
.gs-empty{padding:1.2rem 1rem;font-size:0.82rem;color:var(--muted);text-align:center}

nav{display:flex;gap:0}
nav button{background:none;border:none;border-bottom:2px solid transparent;color:var(--muted);font-family:'Noto Sans KR',sans-serif;font-size:0.82rem;letter-spacing:0.08em;padding:0.4rem 0.9rem;cursor:pointer;transition:color .2s,border-color .2s;white-space:nowrap}
nav button.active,nav button:hover{color:var(--text);border-bottom-color:var(--accent)}

/* ── 레이아웃 ── */
.app{display:none}
aside{display:none !important}
.sidebar-inner{display:none}
.sidebar-label{display:none}

/* 사이드바 필터 바 */
.sb-filter-bar{display:flex;gap:0.35rem;padding:0 1rem 0.7rem;flex-wrap:wrap}
.sb-filter-btn{background:none;border:1px solid var(--line);border-radius:4px;padding:0.22rem 0.6rem;color:var(--muted);font-family:'Noto Sans KR',sans-serif;font-size:0.68rem;cursor:pointer;transition:all .15s;white-space:nowrap}
.sb-filter-btn:hover{color:var(--text);border-color:rgba(255,255,255,0.18)}
.sb-filter-btn.active{background:var(--bg3);color:var(--accent);border-color:var(--accent)}

.list-item{display:block;width:100%;text-align:left;background:none;border:none;padding:0.55rem 1.2rem;color:var(--muted);font-family:'Noto Sans KR',sans-serif;font-size:0.84rem;cursor:pointer;transition:background .15s,color .15s;border-left:2px solid transparent;line-height:1.35}
.list-item:hover{background:var(--bg2);color:var(--text)}
.list-item.active{background:var(--bg3);color:var(--text);border-left-color:var(--accent)}
.list-item .sub{display:flex;align-items:center;gap:0.5rem;font-size:0.68rem;color:var(--muted);margin-top:0.15rem;flex-wrap:wrap}
.list-item .sub-tag{background:var(--bg3);border-radius:3px;padding:0.08rem 0.35rem;font-size:0.63rem}

.sb-year-divider{padding:0.5rem 1.2rem 0.15rem;font-size:0.62rem;color:var(--accent);letter-spacing:0.18em;opacity:0.7;font-family:'Noto Serif KR',serif}

main{padding:2rem;min-height:100vh;box-sizing:border-box;width:100%;display:block}

/* ── 홈 ── */
.home-stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:0.7rem;margin-bottom:2.2rem}
.stat-card{background:var(--bg2);border:1px solid var(--line);border-radius:6px;padding:1rem 1.1rem;cursor:pointer;transition:background .15s,border-color .15s}
.stat-card:hover{background:var(--bg3);border-color:rgba(200,169,110,0.3)}
.stat-num{font-family:'Noto Serif KR',serif;font-size:1.7rem;font-weight:300;color:var(--accent);line-height:1;margin-bottom:0.25rem}
.stat-label{font-size:0.7rem;color:var(--muted);letter-spacing:0.08em}
.home-poster-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:0.7rem;margin-bottom:2rem}
.home-poster-card{border-radius:7px;overflow:hidden;cursor:pointer;background:var(--bg2);border:1px solid var(--line);transition:transform .18s,border-color .18s;position:relative}
.home-poster-card:hover{transform:translateY(-3px);border-color:rgba(200,169,110,0.35)}
.home-poster-card img{width:100%;aspect-ratio:2/3;object-fit:cover;display:block}
.home-poster-ph{width:100%;aspect-ratio:2/3;display:flex;align-items:center;justify-content:center;font-size:2rem;color:var(--muted)}
.home-poster-info{padding:0.55rem 0.65rem}
.home-poster-title{font-size:0.78rem;font-weight:400;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.home-poster-sub{font-size:0.65rem;color:var(--muted);margin-top:0.1rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.home-list{display:flex;flex-direction:column}
.home-row{display:flex;align-items:center;gap:0.8rem;padding:0.75rem 0;border-bottom:1px solid var(--line);cursor:pointer}
.home-row:hover .home-row-title{color:var(--accent)}
.home-row-num{font-size:0.68rem;color:var(--muted);width:1.6rem;text-align:right;flex-shrink:0;font-feature-settings:"tnum"}
.home-row-title{font-size:0.9rem;flex:1;transition:color .2s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.home-row-meta{display:flex;align-items:center;gap:0.5rem;flex-shrink:0}
.home-row-sub{font-size:0.72rem;color:var(--muted)}
.home-row-date{font-size:0.68rem;color:var(--muted);opacity:0.7}
.home-view-toggle{display:flex;gap:0.35rem;margin-bottom:0.8rem;align-items:center}
.hv-btn{background:none;border:1px solid var(--line);border-radius:4px;padding:0.22rem 0.6rem;color:var(--muted);font-family:'Noto Sans KR',sans-serif;font-size:0.7rem;cursor:pointer;transition:all .15s}
.hv-btn.active{background:var(--bg3);color:var(--accent);border-color:var(--accent)}

/* ══════════════════════════
   탭 인덱스 화면 (공연/작품 첫 화면)
   ══════════════════════════ */
.tab-index{width:100%;max-width:none}

/* 필터 패널 */
.filter-panel{background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:1.2rem 1.4rem;margin-bottom:1.8rem;box-sizing:border-box}
.filter-panel-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.filter-panel-title{font-size:0.65rem;letter-spacing:0.2em;color:var(--muted);text-transform:uppercase}
.filter-clear-btn{background:none;border:none;font-family:'Noto Sans KR',sans-serif;font-size:0.72rem;color:var(--muted);cursor:pointer;padding:0;transition:color .15s}
.filter-clear-btn:hover{color:var(--accent)}
.filter-rows{display:flex;flex-direction:column;gap:0.85rem}
.filter-row{display:flex;align-items:flex-start;gap:0.9rem}
.filter-row-label{font-size:0.68rem;letter-spacing:0.12em;color:var(--muted);text-transform:uppercase;min-width:2.8rem;padding-top:0.28rem;flex-shrink:0}
.filter-chips{display:flex;flex-wrap:wrap;gap:0.35rem}
.fchip{background:none;border:1px solid var(--line);border-radius:20px;padding:0.22rem 0.75rem;color:var(--muted);font-family:'Noto Sans KR',sans-serif;font-size:0.76rem;cursor:pointer;transition:all .15s;white-space:nowrap}
.fchip:hover{color:var(--text);border-color:rgba(255,255,255,0.2);background:var(--bg3)}
.fchip.on{background:rgba(200,169,110,0.12);color:var(--accent);border-color:rgba(200,169,110,0.45)}

/* 결과 헤더 */
.result-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.result-count{font-size:0.75rem;color:var(--muted)}
.result-count em{color:var(--accent);font-style:normal;font-weight:500}
.result-view-btns{display:flex;gap:0.3rem}
.rvb{background:none;border:1px solid var(--line);border-radius:4px;padding:0.2rem 0.55rem;color:var(--muted);font-family:'Noto Sans KR',sans-serif;font-size:0.7rem;cursor:pointer;transition:all .15s}
.rvb.on{background:var(--bg3);color:var(--accent);border-color:var(--accent)}

/* 결과 그리드 */
.result-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:0.75rem}
.result-card{border-radius:8px;overflow:hidden;cursor:pointer;background:var(--bg2);border:1px solid var(--line);transition:transform .18s,border-color .18s}
.result-card:hover{transform:translateY(-3px);border-color:rgba(200,169,110,0.35)}
.result-card img{width:100%;aspect-ratio:2/3;object-fit:cover;display:block}
.result-card-ph{width:100%;aspect-ratio:2/3;display:flex;align-items:center;justify-content:center;font-size:2rem;color:var(--muted);background:var(--bg3)}
.result-card-body{padding:0.6rem 0.7rem}
.result-card-title{font-size:0.8rem;font-weight:400;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:0.2rem}
.result-card-sub{font-size:0.65rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.result-card-tags{display:flex;flex-wrap:wrap;gap:0.2rem;margin-top:0.3rem}
.result-card-tag{font-size:0.6rem;padding:0.1rem 0.4rem;border-radius:3px;background:var(--bg3);color:var(--muted)}

/* 결과 리스트 뷰 */
.result-list{display:flex;flex-direction:column}
.result-row{display:flex;align-items:center;gap:0.85rem;padding:0.7rem 0;border-bottom:1px solid var(--line);cursor:pointer;transition:background .12s}
.result-row:hover .rr-title{color:var(--accent)}
.rr-poster{width:36px;height:54px;border-radius:4px;object-fit:cover;flex-shrink:0;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:1rem;color:var(--muted);overflow:hidden}
.rr-poster img{width:100%;height:100%;object-fit:cover}
.rr-main{flex:1;min-width:0}
.rr-title{font-size:0.88rem;font-weight:400;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:color .2s;margin-bottom:0.18rem}
.rr-meta{display:flex;gap:0.55rem;flex-wrap:wrap}
.rr-tag{font-size:0.65rem;color:var(--muted)}
.rr-date{font-size:0.68rem;color:var(--muted);opacity:0.7;flex-shrink:0}

/* 빈 결과 */
.result-empty{padding:3rem 0;text-align:center;color:var(--muted);font-size:0.85rem}
.result-empty-icon{font-size:2.5rem;margin-bottom:0.8rem;opacity:0.4}

/* ── 공연 디테일 ── */
.eyebrow{font-size:0.7rem;letter-spacing:0.25em;color:var(--accent);text-transform:uppercase;margin-bottom:0.6rem}
.detail-title{font-family:'Noto Serif KR',serif;font-weight:300;font-size:clamp(1.4rem,3vw,2rem);letter-spacing:0.04em;line-height:1.3}
.detail-meta{font-size:0.78rem;color:var(--muted);display:flex;gap:1.2rem;flex-wrap:wrap;margin-top:0.6rem}
.detail-header{margin-bottom:2rem;padding-bottom:1.2rem;border-bottom:1px solid var(--line)}
.sec{margin-bottom:2rem}
.sec-label{font-size:0.68rem;letter-spacing:0.22em;color:var(--muted);text-transform:uppercase;margin-bottom:0.8rem;display:flex;align-items:center;gap:0.8rem}
.sec-label::after{content:'';flex:1;height:1px;background:var(--line)}
.poster-wrap{display:flex;gap:2rem;margin-bottom:2rem;align-items:flex-start}
.poster-img{width:180px;flex-shrink:0;border-radius:8px;object-fit:cover;aspect-ratio:2/3;display:block}
.poster-placeholder{width:180px;flex-shrink:0;border-radius:8px;background:var(--bg2);border:1px solid var(--line);aspect-ratio:2/3;display:flex;align-items:center;justify-content:center;font-size:2.5rem;color:var(--muted)}
.poster-info{flex:1;min-width:0}
.cast-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:0.5rem;margin-bottom:1.2rem}
.cast-card{background:var(--bg2);border:1px solid var(--line);border-radius:6px;padding:0.8rem;cursor:pointer;transition:background .15s}
.cast-card:hover{background:var(--bg3)}
.cast-img{width:100%;aspect-ratio:3/4;object-fit:cover;border-radius:4px;margin-bottom:0.6rem;background:var(--bg3);display:block}
.cast-img-ph{width:100%;aspect-ratio:3/4;background:var(--bg3);border-radius:4px;margin-bottom:0.6rem;display:flex;align-items:center;justify-content:center;font-size:1.6rem;color:var(--muted)}
.cast-name{font-size:0.85rem;font-weight:400;margin-bottom:0.2rem}
.cast-role{font-size:0.72rem;color:var(--muted)}
.tag{display:inline-block;font-size:0.63rem;letter-spacing:0.1em;padding:0.18rem 0.5rem;border-radius:3px;margin-right:0.3rem}
.tag-a{background:var(--actor-bg);color:var(--actor)}
.tag-s{background:var(--staff-bg);color:var(--staff)}
.link{color:var(--accent);cursor:pointer;border-bottom:1px solid rgba(200,169,110,0.3);transition:border-color .2s}
.link:hover{border-bottom-color:var(--accent)}
.item-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:0.8rem}
.item-card{background:var(--bg2);border:1px solid var(--line);border-radius:8px;padding:1.2rem;cursor:pointer;transition:background .15s,border-color .15s}
.item-card:hover{background:var(--bg3);border-color:rgba(255,255,255,0.15)}
.item-card-title{font-size:0.95rem;font-weight:400;margin-bottom:0.3rem}
.item-card-sub{font-size:0.75rem;color:var(--muted)}
.empty{color:var(--muted);font-size:0.83rem;padding:2rem 0}

/* ── 참여자 프로필 ── */
.person-header{display:flex;gap:1.6rem;margin-bottom:1.6rem;align-items:flex-start}
.person-photo-col{flex-shrink:0}
.person-photo-col .poster-img,.person-photo-col .poster-placeholder{width:120px;aspect-ratio:2/3}
.person-info-col{flex:1;min-width:0;display:flex;flex-direction:column;gap:0.9rem}
.person-stats-inline{display:flex;gap:0.5rem;flex-wrap:wrap}
.psi-item{background:var(--bg2);border:1px solid var(--line);border-radius:5px;padding:0.55rem 0.8rem;display:flex;flex-direction:column;gap:0.15rem;min-width:64px}
.psi-num{font-family:'Noto Serif KR',serif;font-size:1.2rem;font-weight:300;color:var(--accent);line-height:1}
.psi-label{font-size:0.6rem;color:var(--muted);letter-spacing:0.06em;white-space:nowrap}
.person-troupes-inline{display:flex;flex-wrap:wrap;gap:0.35rem;align-items:center}
.person-troupes-label{font-size:0.62rem;letter-spacing:0.14em;color:var(--muted);text-transform:uppercase;margin-right:0.2rem;flex-shrink:0}
.troupe-chip{display:inline-flex;align-items:center;gap:0.4rem;background:var(--bg2);border:1px solid var(--line);border-radius:20px;padding:0.22rem 0.75rem;font-size:0.75rem;cursor:pointer;transition:background .15s,border-color .15s}
.troupe-chip:hover{background:var(--bg3);border-color:rgba(255,255,255,0.18)}
.troupe-chip-cnt{font-size:0.65rem;color:var(--muted)}
.year-chart-block{background:var(--bg2);border:1px solid var(--line);border-radius:6px;padding:0.85rem 1rem;max-width:360px}
.year-chart-title{font-size:0.62rem;letter-spacing:0.14em;color:var(--muted);text-transform:uppercase;margin-bottom:0.7rem}
.mini-chart{display:flex;align-items:flex-end;gap:4px;height:70px}
.mini-bar-wrap{display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:2px;flex:1;min-width:18px;max-width:36px;height:100%}
.mini-bar-cnt{font-size:0.52rem;color:var(--accent);line-height:1;opacity:0.85}
.mini-bar{width:100%;background:var(--accent);border-radius:2px 2px 0 0;opacity:0.6;transition:opacity .15s;cursor:default;flex-shrink:0}
.mini-bar:hover{opacity:1}
.mini-bar-label{font-size:0.52rem;color:var(--muted);flex-shrink:0}

<script>
var BASE='appQtwYrSzJvmt9NA',TOKEN='patGrndUzESpEA1Dw.741c774c92d507034565c813ea223d26291c105e0a35b6282b5a2c501226e05d';
var DB={shows:[],people:[],history:[],roles:[],staffRoles:[],works:[],troupes:[],venues:[]};
var MAP={},STAFF_ORDER={},ROLE_ORDER={},POSTER={},PERSON_PHOTO={};

function $(i){return document.getElementById(i);}
function sb(h){$('sb').innerHTML=h;}
function mn(h){
  $('mn').innerHTML=h;
  // 이벤트 위임: data-action 속성으로 클릭 처리
  $('mn').onclick=function(e){
    var el=e.target.closest('[data-action]');
    if(!el)return;
    var action=el.dataset.action;
    var id=el.dataset.id;
    if(action==='show')showShow(id);
    else if(action==='person')showPerson(id);
    else if(action==='work')showWork(id);
    else if(action==='role')showRole(id);
    else if(action==='venue')showVenue(id);
    else if(action==='troupe')showTroupe(id);
  };
}
function fld(r,k){return(r&&r.fields&&r.fields[k]!==undefined)?r.fields[k]:null;}
function ids(v){if(!v||!Array.isArray(v))return[];return v.map(function(x){return typeof x==='string'?x:x.id;});}
function nm(id){return MAP[id]||'';}
function iurl(imgs){if(!imgs||!imgs[0])return '';return(imgs[0].thumbnails&&imgs[0].thumbnails.large)?imgs[0].thumbnails.large.url:imgs[0].url;}

async function api(t){
  var all=[],offset='';
  do{
    var url='https://api.airtable.com/v0/'+BASE+'/'+t+'?pageSize=100'+(offset?'&offset='+encodeURIComponent(offset):'');
    var r=await fetch(url,{headers:{Authorization:'Bearer '+TOKEN}});
    if(!r.ok)throw new Error(r.status);
    var data=await r.json();
    all=all.concat(data.records||[]);
    offset=data.offset||'';
  }while(offset);
  return all;
}

async function load(){
  var r=await Promise.allSettled([
    api('tblQ5oPChjABDqfsF'),api('tblOC3tLzU62ick8h'),api('tblozdPlUPzZXU2A6'),
    api('tblTdJpe7J7LGKCM9'),api('tblA3YldoCySlRh3E'),api('tblewL5MuJ0aaSwQu'),
    api('tblCg9DzicDbjJJKl'),api('tblhezC6tdH4o7xo7'),
  ]);
  DB.shows=r[0].value||[];DB.people=r[1].value||[];DB.history=r[2].value||[];
  DB.roles=r[3].value||[];DB.staffRoles=r[4].value||[];DB.works=r[5].value||[];
  DB.troupes=r[6].value||[];DB.venues=r[7].value||[];
  MAP={};
  DB.shows.forEach(function(r){MAP[r.id]=fld(r,'공연명')||'';});
  DB.people.forEach(function(r){MAP[r.id]=fld(r,'이름')||'';});
  DB.roles.forEach(function(r){MAP[r.id]=fld(r,'배역명')||'';});
  DB.staffRoles.forEach(function(r){MAP[r.id]=fld(r,'Name')||'';});
  DB.works.forEach(function(r){MAP[r.id]=fld(r,'작품명')||'';});
  DB.troupes.forEach(function(r){MAP[r.id]=fld(r,'극단명')||'';});
  DB.venues.forEach(function(r){MAP[r.id]=fld(r,'극장명')||'';});
  POSTER={};
  DB.shows.forEach(function(r){var u=iurl(fld(r,'포스터'));if(u)POSTER[r.id]=u;});
  PERSON_PHOTO={};
  DB.people.forEach(function(r){var u=iurl(fld(r,'사진'));if(u)PERSON_PHOTO[r.id]=u;});
  STAFF_ORDER={};
  DB.staffRoles.forEach(function(r){var o=fld(r,'순서');if(o!=null)STAFF_ORDER[r.id]=o;});
  ROLE_ORDER={};
  var roleOrderCandidates=['순서','배역 순서','번호','배역번호','순번','Order','order'];
  var roleOrderField=roleOrderCandidates.find(function(key){
    return DB.roles.some(function(r){return fld(r,key)!=null;});
  });
  if(roleOrderField){
    DB.roles.forEach(function(r){var o=fld(r,roleOrderField);if(o!=null)ROLE_ORDER[r.id]=o;});
  }
}

/* ══ 전역 검색 ══ */
var _gsComposing=false,_gsFocusIdx=-1,_gsItems=[];
document.addEventListener('DOMContentLoaded',function(){
  var inp=$('gs-input');if(!inp)return;
  inp.addEventListener('compositionstart',function(){_gsComposing=true;});
  inp.addEventListener('compositionend',function(){_gsComposing=false;gsInput();});
});
function gsInput(){
  if(_gsComposing)return;
  var q=($('gs-input')||{value:''}).value.trim();
  var cl=$('gs-clear');if(cl)cl.classList.toggle('vis',q.length>0);
  if(!q){gsClose();return;}
  gsRender(q);
}
function gsOpen(){var q=($('gs-input')||{value:''}).value.trim();if(q)gsRender(q);}
function gsClear(){var inp=$('gs-input');if(inp)inp.value='';var cl=$('gs-clear');if(cl)cl.classList.remove('vis');gsClose();if(inp)inp.focus();}
function gsClose(){var d=$('gs-dropdown');if(d){d.classList.remove('open');d.innerHTML='';}  _gsFocusIdx=-1;_gsItems=[];}
function gsRender(q){
  var d=$('gs-dropdown');if(!d)return;
  var results=[];
  DB.shows.filter(function(s){return(fld(s,'공연명')||'').includes(q);}).slice(0,4).forEach(function(s){var trid=ids(fld(s,'극단'))[0]||'';results.push({type:'show',id:s.id,icon:'🎭',name:fld(s,'공연명'),sub:nm(trid)||fld(s,'공연 날짜')||''});});
  DB.people.filter(function(p){return(fld(p,'이름')||'').includes(q);}).slice(0,4).forEach(function(p){var cnt=DB.history.filter(function(h){return isValidH(h)&&ids(fld(h,'참여자')).indexOf(p.id)>-1;}).length;results.push({type:'person',id:p.id,icon:'👤',name:fld(p,'이름'),sub:cnt+'개 이력'});});
  DB.works.filter(function(w){return(fld(w,'작품명')||'').includes(q);}).slice(0,3).forEach(function(w){var cnt=DB.shows.filter(function(s){return ids(fld(s,'작품')).indexOf(w.id)>-1;}).length;results.push({type:'work',id:w.id,icon:'📖',name:fld(w,'작품명'),sub:'공연 '+cnt+'개'});});
  DB.troupes.filter(function(t){return(fld(t,'극단명')||'').includes(q);}).slice(0,3).forEach(function(t){var cnt=DB.shows.filter(function(s){return ids(fld(s,'극단')).indexOf(t.id)>-1;}).length;results.push({type:'troupe',id:t.id,icon:'🏢',name:fld(t,'극단명'),sub:'공연 '+cnt+'개'});});
  DB.venues.filter(function(v){return(fld(v,'극장명')||'').includes(q);}).slice(0,3).forEach(function(v){var cnt=DB.shows.filter(function(s){return ids(fld(s,'극장')).indexOf(v.id)>-1;}).length;results.push({type:'venue',id:v.id,icon:'📍',name:fld(v,'극장명'),sub:'공연 '+cnt+'개'});});
  DB.roles.filter(function(r){return(fld(r,'배역명')||'').includes(q);}).slice(0,4).forEach(function(r){var wid=ids(fld(r,'작품'))[0]||'';var actCnt=DB.history.filter(function(h){return isValidH(h)&&ids(fld(h,'배역')).indexOf(r.id)>-1;}).length;results.push({type:'role',id:r.id,icon:'🎬',name:fld(r,'배역명'),sub:(nm(wid)?nm(wid)+' · ':'')+actCnt+'명 출연'});});
  _gsItems=results;_gsFocusIdx=-1;
  if(!results.length){d.innerHTML='<div class="gs-empty">검색 결과 없음</div>';d.classList.add('open');return;}
  var typeLabel={show:'공연',person:'참여자',work:'작품',troupe:'극단',venue:'극장',role:'배역'};
  var lastType='';var html='';
  results.forEach(function(item,i){
    if(item.type!==lastType){if(lastType)html+='<div class="gs-divider"></div>';html+='<div class="gs-group-label">'+typeLabel[item.type]+'</div>';lastType=item.type;}
    html+='<div class="gs-item" data-idx="'+i+'" onmousedown="gsSelect('+i+')">'+'<span class="gs-item-icon">'+item.icon+'</span>'+'<div class="gs-item-main">'+'<div class="gs-item-name">'+item.name+'</div>'+(item.sub?'<div class="gs-item-sub">'+item.sub+'</div>':'')+'</div></div>';
  });
  d.innerHTML=html;d.classList.add('open');
}
function gsSelect(idx){
  var item=_gsItems[idx];if(!item)return;
  gsClose();var inp=$('gs-input');if(inp)inp.value='';var cl=$('gs-clear');if(cl)cl.classList.remove('vis');
  if(item.type==='show')showShow(item.id);
  else if(item.type==='person')showPerson(item.id);
  else if(item.type==='work')showWork(item.id);
  else if(item.type==='troupe')showTroupe(item.id);
  else if(item.type==='venue')showVenue(item.id);
  else if(item.type==='role')showRole(item.id);
}
function gsKeydown(e){
  var d=$('gs-dropdown');if(!d||!d.classList.contains('open'))return;
  if(e.key==='ArrowDown'){e.preventDefault();_gsFocusIdx=Math.min(_gsFocusIdx+1,_gsItems.length-1);gsHighlight();}
  else if(e.key==='ArrowUp'){e.preventDefault();_gsFocusIdx=Math.max(_gsFocusIdx-1,0);gsHighlight();}
  else if(e.key==='Enter'){e.preventDefault();if(_gsFocusIdx>=0)gsSelect(_gsFocusIdx);else if(_gsItems.length===1)gsSelect(0);}
  else if(e.key==='Escape'){gsClose();}
}
function gsHighlight(){var d=$('gs-dropdown');if(!d)return;d.querySelectorAll('.gs-item').forEach(function(el){el.classList.toggle('focused',parseInt(el.dataset.idx)===_gsFocusIdx);});}
document.addEventListener('click',function(e){var wrap=$('gs-wrap');if(wrap&&!wrap.contains(e.target))gsClose();});

/* ══ 유틸 ══ */
function sortShows(arr){return arr.slice().sort(function(a,b){var da=fld(a,'공연 날짜')||'',db=fld(b,'공연 날짜')||'';if(!da&&!db)return 0;if(!da)return 1;if(!db)return -1;return db.localeCompare(da);});}
function showDate(sid){var s=DB.shows.find(function(x){return x.id===sid;});if(!s)return '';var candidates=['공연 날짜','날짜','공연일자','공연일','공연날짜','Date','date'];for(var i=0;i<candidates.length;i++){var v=fld(s,candidates[i]);if(v)return v;}return '';}
function sortHistByShowDate(arr){return arr.slice().sort(function(a,b){var da=showDate(ids(fld(a,'공연'))[0]||''),db=showDate(ids(fld(b,'공연'))[0]||'');if(!da&&!db)return 0;if(!da)return 1;if(!db)return -1;return db.localeCompare(da);});}
function ym(dateStr){if(!dateStr)return '';var m=dateStr.match(/^(\d{4})-(\d{2})/);return m?(m[1]+'.'+m[2]):dateStr;}
function yearOf(dateStr){if(!dateStr)return '';var m=dateStr.match(/^(\d{4})/);return m?m[1]:'';}
function isValidH(h){return ids(fld(h,'참여자')).length>0;}
function histByShow(sid){return DB.history.filter(function(h){return isValidH(h)&&ids(fld(h,'공연')).indexOf(sid)>-1;});}
function histByPerson(pid){return DB.history.filter(function(h){return isValidH(h)&&ids(fld(h,'참여자')).indexOf(pid)>-1;});}
function tname(h){var t=fld(h,'역할 타입');return t?(typeof t==='string'?t:t.name||''):'';}
function isMobile(){return window.innerWidth<=768;}
function mobShowList(){var a=$('sb');if(a)a.classList.remove('mob-hidden');}
function mobShowDetail(){var a=$('sb');if(a)a.classList.add('mob-hidden');}
function injectBackBtn(label,fn){
  if(!isMobile())return;
  var m=$('mn');if(!m)return;
  var btn=document.createElement('button');btn.className='mob-back-btn';btn.innerHTML='← '+label;btn.onclick=fn;
  m.insertBefore(btn,m.firstChild);
}
function setNav(v){
  ['home','shows','people','works','roles','venues','troupes'].forEach(function(n){
    var el=$('nav-'+n);if(el)el.classList.toggle('active',n===v);
    var mel=$('mobt-'+n);if(mel)mel.classList.toggle('active',n===v);
  });
}
function actorCard(rec){
  var pid=ids(fld(rec,'참여자'))[0]||'';
  var u=iurl(fld(rec,'사진'));
  var imgH=u?'<img class="cast-img" src="'+u+'" alt="'+nm(pid)+'">':'<div class="cast-img-ph">🎭</div>';
  var rid=ids(fld(rec,'배역'))[0]||'';
  return '<div class="cast-card" data-action="person" data-id="' + pid + '">'+imgH+'<div class="cast-name">'+nm(pid)+'</div>'+(nm(rid)?'<div class="cast-role">'+nm(rid)+'</div>':'')+'</div>';
}
function setIndexMode(on){/* aside removed, no-op */}

/* ══ 홈 ══ */
var _homeView='grid';
function goHome(push){
  if(push!==false)history.pushState({view:'home'},'','#home');
  setNav('home');sb('');_sbContext='';setIndexMode(false);
  renderHome();
}
function renderHome(){
  var shows=DB.shows.filter(function(s){return fld(s,'공연명');});
  var people=DB.people.filter(function(p){return fld(p,'이름');});
  var venues=DB.venues.filter(function(v){return fld(v,'극장명');});
  var troupes=DB.troupes.filter(function(t){return fld(t,'극단명');});
  var works=DB.works.filter(function(w){return fld(w,'작품명');});
  var statsH='<div class="home-stats">'
    +'<div class="stat-card" onclick="goShows()"><div class="stat-num">'+shows.length+'</div><div class="stat-label">공연</div></div>'
    +'<div class="stat-card" onclick="goPeople()"><div class="stat-num">'+people.length+'</div><div class="stat-label">참여자</div></div>'
    +'<div class="stat-card" onclick="goWorks()"><div class="stat-num">'+works.length+'</div><div class="stat-label">작품</div></div>'
    +'<div class="stat-card" onclick="goVenues()"><div class="stat-num">'+venues.length+'</div><div class="stat-label">극장</div></div>'
    +'<div class="stat-card" onclick="goTroupes()"><div class="stat-num">'+troupes.length+'</div><div class="stat-label">극단</div></div>'
    +'</div>';
  var sorted=sortShows(shows);var recent=sorted.slice(0,12);
  var toggleH='<div class="home-view-toggle"><span style="font-size:0.65rem;letter-spacing:0.18em;color:var(--muted);text-transform:uppercase;margin-right:0.3rem">최근 공연</span>'

var _showFilter={troupes:[],years:[],venues:[]};
var _showIndexView='grid'; // 'grid' | 'list'

function goShows(push){
  if(push!==false)history.pushState({view:'shows'},'','#shows');
  setNav('shows');_sbContext='shows';
  setIndexMode(true); // 사이드바 숨기고 메인 전체 사용
  sb('');
  _showFilter={troupes:[],years:[],venues:[]};
  renderShowIndex();
}

function renderShowIndex(){
  var allShows=sortShows(DB.shows.filter(function(s){return fld(s,'공연명');}));

  // 필터 옵션 수집
  var troupeSet={},yearSet={},venueSet={};
  allShows.forEach(function(s){
    var tid=ids(fld(s,'극단'))[0]||'';if(tid&&nm(tid))troupeSet[tid]=nm(tid);
    var y=yearOf(fld(s,'공연 날짜')||'');if(y)yearSet[y]=y;
    var vid=ids(fld(s,'극장'))[0]||'';if(vid&&nm(vid))venueSet[vid]=nm(vid);
  });
  var troupeIds=Object.keys(troupeSet).sort(function(a,b){return troupeSet[a].localeCompare(troupeSet[b]);});
  var years=Object.keys(yearSet).sort().reverse();
  var venueIds=Object.keys(venueSet).sort(function(a,b){return venueSet[a].localeCompare(venueSet[b]);});

  // 필터 적용
  var filtered=allShows.filter(function(s){
    if(_showFilter.troupes.length>0){var tid=ids(fld(s,'극단'))[0]||'';if(_showFilter.troupes.indexOf(tid)===-1)return false;}
    if(_showFilter.years.length>0){var y=yearOf(fld(s,'공연 날짜')||'')||'연도미상';if(_showFilter.years.indexOf(y)===-1)return false;}
    if(_showFilter.venues.length>0){var vid=ids(fld(s,'극장'))[0]||'';if(_showFilter.venues.indexOf(vid)===-1)return false;}
    return true;
  });

  var hasFilter=_showFilter.troupes.length>0||_showFilter.years.length>0||_showFilter.venues.length>0;

  // 필터 패널 HTML
  var filterH='<div class="filter-panel">'
    +'<div class="filter-panel-top"><span class="filter-panel-title">필터</span>'
    +(hasFilter?'<button class="filter-clear-btn" onclick="clearShowFilter()">전체 초기화</button>':'')
    +'</div>'
    +'<div class="filter-rows">';

  // 극단 필터
  if(troupeIds.length>0){
    filterH+='<div class="filter-row"><span class="filter-row-label">극단</span><div class="filter-chips">';
    troupeIds.forEach(function(tid){
      var on=_showFilter.troupes.indexOf(tid)>-1;
      filterH+='<button class="fchip'+(on?' on':'')+'" onclick="toggleShowFilter(\'troupes\',\''+tid+'\')">'+nm(tid)+'</button>';
    });
    filterH+='</div></div>';
  }
  // 연도 필터
  if(years.length>0){
    filterH+='<div class="filter-row"><span class="filter-row-label">연도</span><div class="filter-chips">';
    filterH+='<button class="fchip'+(_showFilter.years.indexOf('연도미상')>-1?' on':'')+'" onclick="toggleShowFilter(\'years\',\'연도미상\')">연도 미상</button>';
    years.forEach(function(y){
      var on=_showFilter.years.indexOf(y)>-1;
      filterH+='<button class="fchip'+(on?' on':'')+'" onclick="toggleShowFilter(\'years\',\''+y+'\')">'+y+'</button>';
    });
    filterH+='</div></div>';
  }
  // 극장 필터
  if(venueIds.length>0){
    filterH+='<div class="filter-row"><span class="filter-row-label">극장</span><div class="filter-chips">';
    venueIds.forEach(function(vid){
      var on=_showFilter.venues.indexOf(vid)>-1;
      filterH+='<button class="fchip'+(on?' on':'')+'" onclick="toggleShowFilter(\'venues\',\''+vid+'\')">'+nm(vid)+'</button>';
    });
    filterH+='</div></div>';
  }
  filterH+='</div></div>';

  // 결과 헤더
  var resultH='<div class="result-header">'
    +'<span class="result-count"><em>'+filtered.length+'</em>개 공연</span>'
    +'<div class="result-view-btns">'
    +'<button class="rvb'+(_showIndexView==='grid'?' on':'')+'" onclick="_showIndexView=&apos;grid&apos;;renderShowIndex()">▦</button>'
    +'<button class="rvb'+(_showIndexView==='list'?' on':'')+'" onclick="_showIndexView=&apos;list&apos;;renderShowIndex()">≡</button>'
    +'</div></div>';

  // 결과 목록
  var listH='';
  if(!filtered.length){
    listH='<div class="result-empty"><div class="result-empty-icon">🎭</div>조건에 맞는 공연이 없어요.<br><span style="font-size:0.75rem;opacity:0.6">필터를 조정해보세요</span></div>';
  } else if(_showIndexView==='grid'){
    listH='<div class="result-grid">';
    filtered.forEach(function(s){
      var wid=ids(fld(s,'작품'))[0]||'';
      var trid=ids(fld(s,'극단'))[0]||'';
      var date=ym(fld(s,'공연 날짜')||'');
      var p=POSTER[s.id]||'';
      listH+='<div class="result-card" data-action="show" data-id="'+s.id+'">'
        +(p?'<img src="'+p+'" alt="'+fld(s,'공연명')+'">':'<div class="result-card-ph">🎭</div>')
        +'<div class="result-card-body">'
        +'<div class="result-card-title">'+fld(s,'공연명')+'</div>'
        +'<div class="result-card-sub">'+(nm(trid)||nm(wid)||'')+'</div>'
        +(date?'<div class="result-card-sub">'+date+'</div>':'')
        +'</div></div>';
    });
    listH+='</div>';
  } else {
    listH='<div class="result-list">';
    filtered.forEach(function(s){
      var wid=ids(fld(s,'작품'))[0]||'';
      var trid=ids(fld(s,'극단'))[0]||'';
      var vid=ids(fld(s,'극장'))[0]||'';
      var date=fld(s,'공연 날짜')||'';
      var p=POSTER[s.id]||'';
      listH+='<div class="result-row" data-action="show" data-id="'+s.id+'">'
        +'<div class="rr-poster">'+(p?'<img src="'+p+'">':'🎭')+'</div>'
        +'<div class="rr-main">'
        +'<div class="rr-title">'+fld(s,'공연명')+'</div>'
        +'<div class="rr-meta">'
        +(nm(wid)?'<span class="rr-tag">'+nm(wid)+'</span>':'')
        +(nm(trid)?'<span class="rr-tag">'+nm(trid)+'</span>':'')
        +(nm(vid)?'<span class="rr-tag">'+nm(vid)+'</span>':'')
        +'</div></div>'
        +(date?'<span class="rr-date">'+ym(date)+'</span>':'')
        +'</div>';
    });
    listH+='</div>';
  }

  mn('<div class="tab-index">'+filterH+resultH+listH+'</div>');
}

var _allWorks=[];

var _workFilter={country:'',minCast:0};

function goWorks(push){
  if(push!==false)history.pushState({view:'works'},'','#works');
  setNav('works');_sbContext='works';
  setIndexMode(true);
  _allWorks=DB.works.filter(function(w){return fld(w,'작품명');});
  _workFilter={years:[],minCast:0};
  renderWorkIndex();
}

function renderWorkIndex(){
  // 국가 옵션 수집
  var countrySet={};
  _allWorks.forEach(function(w){
    var c=fld(w,'국가')||fld(w,'원작국가')||fld(w,'나라')||'';
    if(c){(Array.isArray(c)?c:[c]).forEach(function(v){if(v)countrySet[v]=true;});}
  });
  var countries=Object.keys(countrySet).sort();

  // 필터 적용
  var filtered=_allWorks.filter(function(w){
    if(_workFilter.country){
      var c=fld(w,'국가')||fld(w,'원작국가')||fld(w,'나라')||'';
      var vals=Array.isArray(c)?c:[c];
      if(vals.indexOf(_workFilter.country)===-1)return false;
    }
    if(_workFilter.minCast>0){
      var roleCnt=DB.roles.filter(function(r){return ids(fld(r,'작품')).indexOf(w.id)>-1;}).length;
      if(roleCnt<_workFilter.minCast)return false;
    }
    return true;
  });

  var hasFilter=!!_workFilter.country||_workFilter.minCast>0;
  var filterH='<div class="filter-panel"><div class="filter-panel-top"><span class="filter-panel-title">필터</span>'+(hasFilter?'<button class="filter-clear-btn" onclick="clearWorkFilter()">전체 초기화</button>':''  )+'</div><div class="filter-rows">';

  // 국가 필터
  if(countries.length){
    filterH+='<div class="filter-row"><span class="filter-row-label">국가</span><div class="filter-chips">';
    filterH+='<button class="fchip'+(!_workFilter.country?' on':'')+'" onclick="_workFilter.country=\'\';renderWorkIndex()">전체</button>';
    countries.forEach(function(c){var on=_workFilter.country===c;filterH+='<button class="fchip'+(on?' on':'')+'" onclick="_workFilter.country=\''+c+'\';renderWorkIndex()">'+c+'</button>';});
    filterH+='</div></div>';
  }

  // 배역 인원 필터
  var mc=_workFilter.minCast;
  filterH+='<div class="filter-row"><span class="filter-row-label">배역 인원</span><div class="filter-chips">'
    +'<button class="fchip'+(mc===0?' on':'')+'" onclick="_workFilter.minCast=0;renderWorkIndex()">전체</button>'
    +'<button class="fchip'+(mc===3?' on':'')+'" onclick="_workFilter.minCast=3;renderWorkIndex()">3명 이상</button>'
    +'<button class="fchip'+(mc===5?' on':'')+'" onclick="_workFilter.minCast=5;renderWorkIndex()">5명 이상</button>'
    +'<button class="fchip'+(mc===10?' on':'')+'" onclick="_workFilter.minCast=10;renderWorkIndex()">10명 이상</button>'
    +'</div></div>';

  filterH+='</div></div>';
  var resultH='<div class="result-header"><span class="result-count"><em>'+filtered.length+'</em>개 작품</span><div class="result-view-btns"><button class="rvb'+(_workIndexView==='grid'?' on':'')+'" onclick="_workIndexView=\'grid\';renderWorkIndex()">▦</button><button class="rvb'+(_workIndexView==='list'?' on':'')+'" onclick="_workIndexView=\'list\';renderWorkIndex()">≡</button></div></div>';

  var listH='';
  if(!filtered.length){listH='<div class="result-empty"><div class="result-empty-icon">📖</div>조건에 맞는 작품이 없어요.</div>';}
  else if(_workIndexView==='grid'){
    listH='<div class="result-grid">';
    filtered.forEach(function(w){
      var shows=DB.shows.filter(function(s){return ids(fld(s,'작품')).indexOf(w.id)>-1;});
      var roleCnt=DB.roles.filter(function(r){return ids(fld(r,'작품')).indexOf(w.id)>-1;}).length;
      var country=fld(w,'국가')||fld(w,'원작국가')||fld(w,'나라')||'';
      var countryLabel=Array.isArray(country)?country.join(', '):country;
      listH+='<div class="result-card" data-action="work" data-id="'+w.id+'"><div class="result-card-ph">📖</div><div class="result-card-body"><div class="result-card-title">'+fld(w,'작품명')+'</div>'+(fld(w,'작품명 (영문)')?'<div class="result-card-sub">'+fld(w,'작품명 (영문)')+'</div>':'')+(countryLabel?'<div class="result-card-sub">'+countryLabel+'</div>':'')+'<div class="result-card-sub">공연 '+shows.length+'개'+(roleCnt?' · 배역 '+roleCnt+'명':'')+'</div></div></div>';
    });
    listH+='</div>';
  } else {
    listH='<div class="result-list">';
    filtered.forEach(function(w){
      var shows=DB.shows.filter(function(s){return ids(fld(s,'작품')).indexOf(w.id)>-1;});
      var roleCnt=DB.roles.filter(function(r){return ids(fld(r,'작품')).indexOf(w.id)>-1;}).length;
      var country=fld(w,'국가')||fld(w,'원작국가')||fld(w,'나라')||'';
      var countryLabel=Array.isArray(country)?country.join(', '):country;
      listH+='<div class="result-row" data-action="work" data-id="'+w.id+'"><div class="rr-poster">📖</div><div class="rr-main"><div class="rr-title">'+fld(w,'작품명')+'</div><div class="rr-meta">'+(fld(w,'작품명 (영문)')?'<span class="rr-tag">'+fld(w,'작품명 (영문)')+'</span>':'')+(countryLabel?'<span class="rr-tag">'+countryLabel+'</span>':'')+'<span class="rr-tag">공연 '+shows.length+'개</span>'+(roleCnt?'<span class="rr-tag">배역 '+roleCnt+'명</span>':'')+'</div></div></div>';
    });
    listH+='</div>';
  }
  mn('<div class="tab-index">'+filterH+resultH+listH+'</div>');
}
function toggleWorkFilter(key,val){var arr=_workFilter[key];var idx=arr.indexOf(val);if(idx>-1)arr.splice(idx,1);else arr.push(val);renderWorkIndex();}
function clearWorkFilter(){_workFilter={country:'',minCast:0};renderWorkIndex();}
function showWork(wid,push){

  if(roles.length){h+='<div class="sec"><div class="sec-label">등장인물</div><div class="item-grid">'+roles.map(function(r){return '<div class="item-card" data-action="role" data-id="'+r.id+'"><div class="item-card-title">'+fld(r,'배역명')+'</div></div>';}).join('')+'</div></div>';}

/* ══ 배역 인덱스 ══ */
var _roleFilter={work:'all',gender:'',minAct:0};
var _roleIndexView='grid';

function goRoles(push){
  if(push!==false)history.pushState({view:'roles'},'','#roles');
  setNav('roles');_sbContext='roles';setIndexMode(true);
  _allRoles=DB.roles.filter(function(r){return fld(r,'배역명');}).sort(function(a,b){
    var oa=ROLE_ORDER[a.id],ob=ROLE_ORDER[b.id];
    if(oa==null&&ob==null){var wa=ids(fld(a,'작품'))[0]||'',wb=ids(fld(b,'작품'))[0]||'';return wa.localeCompare(wb);}
    if(oa==null)return 1;if(ob==null)return -1;return oa-ob;
  });
  _roleFilter={work:'all'};renderRoleIndex();
}

function renderRoleIndex(){
  var workSet={};
  _allRoles.forEach(function(r){var wid=ids(fld(r,'작품'))[0]||'';if(wid&&nm(wid))workSet[wid]=nm(wid);});
  var workIds=Object.keys(workSet).sort(function(a,b){return workSet[a].localeCompare(workSet[b]);});

  // 성별 옵션 수집
  var genderSet={};
  _allRoles.forEach(function(r){var g=fld(r,'성별')||fld(r,'젠더')||'';if(g)genderSet[g]=true;});
  var genders=Object.keys(genderSet).sort();

  // 필터 적용
  var filtered=_allRoles.filter(function(r){
    if(_roleFilter.work!=='all'&&ids(fld(r,'작품')).indexOf(_roleFilter.work)===-1)return false;
    if(_roleFilter.gender&&(fld(r,'성별')||fld(r,'젠더')||'')!==_roleFilter.gender)return false;
    if(_roleFilter.minAct>0){
      var cnt=DB.history.filter(function(h){return isValidH(h)&&ids(fld(h,'배역')).indexOf(r.id)>-1;}).length;
      if(cnt<_roleFilter.minAct)return false;
    }
    return true;
  });

  var hasFilter=_roleFilter.work!=='all'||!!_roleFilter.gender||_roleFilter.minAct>0;
  var filterH='<div class="filter-panel"><div class="filter-panel-top"><span class="filter-panel-title">필터</span>'+(hasFilter?'<button class="filter-clear-btn" onclick="_roleFilter={work:\'all\',gender:\'\',minAct:0};renderRoleIndex()">전체 초기화</button>':''  )+'</div><div class="filter-rows">';

  // 작품 필터
  if(workIds.length){
    filterH+='<div class="filter-row"><span class="filter-row-label">작품</span><div class="filter-chips">';
    workIds.forEach(function(wid){var on=_roleFilter.work===wid;filterH+='<button class="fchip'+(on?' on':'')+'" onclick="_roleFilter.work=\''+( on?'all':wid)+'\';renderRoleIndex()">'+nm(wid)+'</button>';});
    filterH+='</div></div>';
  }

  // 성별 필터
  if(genders.length){
    filterH+='<div class="filter-row"><span class="filter-row-label">성별</span><div class="filter-chips">';
    filterH+='<button class="fchip'+(!_roleFilter.gender?' on':'')+'" onclick="_roleFilter.gender=\'\';renderRoleIndex()">전체</button>';
    genders.forEach(function(g){var on=_roleFilter.gender===g;filterH+='<button class="fchip'+(on?' on':'')+'" onclick="_roleFilter.gender=\''+g+'\';renderRoleIndex()">'+g+'</button>';});
    filterH+='</div></div>';
  }

  // 출연 이력 횟수 필터
  var ma=_roleFilter.minAct;
  filterH+='<div class="filter-row"><span class="filter-row-label">출연 횟수</span><div class="filter-chips">'
    +'<button class="fchip'+(ma===0?' on':'')+'" onclick="_roleFilter.minAct=0;renderRoleIndex()">전체</button>'
    +'<button class="fchip'+(ma===2?' on':'')+'" onclick="_roleFilter.minAct=2;renderRoleIndex()">2회 이상</button>'
    +'<button class="fchip'+(ma===3?' on':'')+'" onclick="_roleFilter.minAct=3;renderRoleIndex()">3회 이상</button>'
    +'<button class="fchip'+(ma===5?' on':'')+'" onclick="_roleFilter.minAct=5;renderRoleIndex()">5회 이상</button>'
    +'</div></div>';

  filterH+='</div></div>';
  var resultH='<div class="result-header"><span class="result-count"><em>'+filtered.length+'</em>개 배역</span><div class="result-view-btns"><button class="rvb'+(_roleIndexView==='grid'?' on':'')+'" onclick="_roleIndexView=\'grid\';renderRoleIndex()">▦</button><button class="rvb'+(_roleIndexView==='list'?' on':'')+'" onclick="_roleIndexView=\'list\';renderRoleIndex()">≡</button></div></div>';

  var listH='';
  if(!filtered.length){listH='<div class="result-empty"><div class="result-empty-icon">🎬</div>해당하는 배역이 없어요.</div>';}
  else if(_roleIndexView==='grid'){
    listH='<div class="result-grid">';
    filtered.forEach(function(r){
      var wid=ids(fld(r,'작품'))[0]||'';
      var gender=fld(r,'성별')||fld(r,'젠더')||'';
      listH+='<div class="result-card" data-action="role" data-id="'+r.id+'"><div class="result-card-ph">🎬</div><div class="result-card-body"><div class="result-card-title">'+fld(r,'배역명')+'</div>'+(nm(wid)?'<div class="result-card-sub">'+nm(wid)+'</div>':'')+(gender?'<div class="result-card-sub">'+gender+'</div>':'')+'</div></div>';
    });
    listH+='</div>';
  } else {
    listH='<div class="result-list">';
    filtered.forEach(function(r){
      var wid=ids(fld(r,'작품'))[0]||'';
      var gender=fld(r,'성별')||fld(r,'젠더')||'';
      var actCnt=DB.history.filter(function(h){return isValidH(h)&&ids(fld(h,'배역')).indexOf(r.id)>-1;}).length;
      listH+='<div class="result-row" data-action="role" data-id="'+r.id+'"><div class="rr-poster">🎬</div><div class="rr-main"><div class="rr-title">'+fld(r,'배역명')+'</div><div class="rr-meta">'+(nm(wid)?'<span class="rr-tag">'+nm(wid)+'</span>':'')+(gender?'<span class="rr-tag">'+gender+'</span>':'')+(actCnt?'<span class="rr-tag">'+actCnt+'명 출연</span>':'')+'</div></div></div>';
    });
    listH+='</div>';
  }
  mn('<div class="tab-index">'+filterH+resultH+listH+'</div>');
}
function showRole(rid,push){
  if(push!==false)history.pushState({view:'role',id:rid},'','#role-'+rid);
  setNav('roles');setIndexMode(false);mobShowDetail();
  var role=DB.roles.find(function(r){return r.id===rid;});if(!role)return;
  var wid=ids(fld(role,'작품'))[0]||'';
  var hists=DB.history.filter(function(h){return isValidH(h)&&ids(fld(h,'배역')).indexOf(rid)>-1;});
  var showIds=[];hists.forEach(function(h){var sid=ids(fld(h,'공연'))[0]||'';if(sid&&showIds.indexOf(sid)===-1)showIds.push(sid);});
  var siblingRoles=wid?DB.roles.filter(function(r){return r.id!==rid&&ids(fld(r,'작품')).indexOf(wid)>-1&&fld(r,'배역명');}):[];
  var h='<div class="detail-header"><div class="eyebrow">'+(wid?'<span class="link" data-action="work" data-id="'+wid+'">'+nm(wid)+'</span> · 배역':'배역')+'</div><div class="detail-title">'+fld(role,'배역명')+'</div><div class="detail-meta"><span>출연 '+hists.length+'건</span>'+(showIds.length?'<span>공연 '+showIds.length+'개</span>':'')+'</div></div>';
  if(hists.length){
    // 공연별로 묶어서 날짜순 정렬
    var byShow={};hists.forEach(function(h){var sid=ids(fld(h,'공연'))[0]||'';if(!sid)return;if(!byShow[sid])byShow[sid]=[];byShow[sid].push(h);});
    var showOrder=Object.keys(byShow).sort(function(a,b){var da=showDate(a),db=showDate(b);if(!da&&!db)return 0;if(!da)return 1;if(!db)return -1;return db.localeCompare(da);});
    h+='<div class="sec"><div class="sec-label">출연 이력</div><div class="cast-grid">';
    showOrder.forEach(function(sid){
      var sHists=byShow[sid];
      var sDate=ym(showDate(sid));
      var showRec=DB.shows.find(function(x){return x.id===sid;})||{};
      var trid=ids(fld(showRec,'극단'))[0]||'';
      sHists.forEach(function(rec){
        var pid=ids(fld(rec,'참여자'))[0]||'';
        var u=iurl(fld(rec,'사진'))||PERSON_PHOTO[pid]||'';
        var imgH=u?'<img class="cast-img" src="'+u+'">':'<div class="cast-img-ph">🎭</div>';
        h+='<div class="cast-card" data-action="person" data-id="'+pid+'">'
          +imgH
          +'<div class="cast-name">'+nm(pid)+'</div>'
          +'<div class="cast-role"><span class="link" data-action="show" data-id="'+sid+'">'+nm(sid)+'</span></div>'
          +(sDate||nm(trid)?'<div class="cast-role" style="opacity:.65">'+(sDate||'')+(sDate&&nm(trid)?' · ':'')+nm(trid)+'</div>':'')
          +'</div>';
      });
    });
    h+='</div></div>';
  } else {h+='<div class="empty">출연 이력이 없습니다.</div>';}
  if(siblingRoles.length){
    h+='<div class="sec"><div class="sec-label">같은 작품의 다른 배역</div><div class="item-grid">';
    siblingRoles.forEach(function(r){var actCnt=DB.history.filter(function(h){return isValidH(h)&&ids(fld(h,'배역')).indexOf(r.id)>-1;}).length;h+='<div class="item-card" data-action="role" data-id="'+r.id+'"><div class="item-card-title">'+fld(r,'배역명')+'</div><div class="item-card-sub">출연 '+actCnt+'명</div></div>';});
    h+='</div></div>';
  }
  mn(h);injectBackBtn('← 배역',function(){goRoles();});
}

function goVenues(push){
  if(push!==false)history.pushState({view:'venues'},'','#venues');
  setNav('venues');_sbContext='venues';setIndexMode(true);
  _allVenues=DB.venues.filter(function(v){return fld(v,'극장명');});
  renderVenueIndex();
}
function renderVenueIndex(){
  var all=_allVenues;
  if(!all.length){mn('<div class="tab-index"><div class="result-empty"><div class="result-empty-icon">📍</div>극장 데이터가 없습니다.</div></div>');return;}
  var resultH='<div class="result-header"><span class="result-count"><em>'+all.length+'</em>개 극장</span></div>';
  var listH='<div class="result-grid">';
  all.forEach(function(v){
    var shows=DB.shows.filter(function(s){return ids(fld(s,'극장')).indexOf(v.id)>-1;});
    listH+='<div class="result-card" data-action="venue" data-id="'+v.id+'"><div class="result-card-ph">📍</div><div class="result-card-body"><div class="result-card-title">'+fld(v,'극장명')+'</div><div class="result-card-sub">공연 '+shows.length+'개</div></div></div>';
  });
  listH+='</div>';
  mn('<div class="tab-index">'+resultH+listH+'</div>');
}
function showVenue(vid,push){
  if(push!==false)history.pushState({view:'venue',id:vid},'','#venue-'+vid);
  setNav('venues');setIndexMode(false);mobShowDetail();
  var venue=DB.venues.find(function(v){return v.id===vid;});if(!venue)return;
  var shows=sortShows(DB.shows.filter(function(s){return ids(fld(s,'극장')).indexOf(vid)>-1;}));
  var h='<div class="detail-header"><div class="eyebrow">극장</div><div class="detail-title">'+fld(venue,'극장명')+'</div><div class="detail-meta"><span>공연 '+shows.length+'개</span></div></div>';
  if(shows.length){
    // 연도별 그루핑
    var byYear={};var yearOrder=[];
    shows.forEach(function(s){
      var y=yearOf(fld(s,'공연 날짜')||'')||'연도 미상';
      if(!byYear[y]){byYear[y]=[];yearOrder.push(y);}
      byYear[y].push(s);
    });
    h+='<div class="sec">';
    yearOrder.forEach(function(y){
      h+='<div class="sec-label">'+y+'</div><div class="item-grid" style="margin-bottom:1.5rem">';
      byYear[y].forEach(function(s){
        var wid=ids(fld(s,'작품'))[0]||'';
        var p=POSTER[s.id]||'';
        h+='<div class="item-card" data-action="show" data-id="'+s.id+'">'
          +(p?'<img src="'+p+'" style="width:100%;aspect-ratio:2/3;object-fit:cover;border-radius:4px;margin-bottom:0.6rem">':'')
          +'<div class="item-card-title">'+fld(s,'공연명')+'</div>'
          +'<div class="item-card-sub">'+nm(wid)+(fld(s,'공연 날짜')?' · '+ym(fld(s,'공연 날짜')):'')+'</div>'
          +'</div>';
      });
      h+='</div>';
    });
    h+='</div>';
  } else {h+='<div class="empty">등록된 공연이 없습니다.</div>';}
  mn(h);injectBackBtn('← 극장',function(){goVenues();});
}

function goTroupes(push){
  if(push!==false)history.pushState({view:'troupes'},'','#troupes');
  setNav('troupes');_sbContext='troupes';setIndexMode(true);
  _allTroupes=DB.troupes.filter(function(t){return fld(t,'극단명');});
  renderTroupeIndex();
}


function renderTroupeIndex(){
  var all=_allTroupes;
  if(!all.length){mn('<div class="tab-index"><div class="result-empty"><div class="result-empty-icon">🏢</div>극단 데이터가 없습니다.</div></div>');return;}

  var resultH='<div class="result-header"><span class="result-count"><em>'+all.length+'</em>개 극단</span></div>';

  var listH='<div class="result-grid">';
  all.forEach(function(t){
    var shows=DB.shows.filter(function(s){return ids(fld(s,'극단')).indexOf(t.id)>-1;});
    var memberSet={};
    shows.forEach(function(s){
      DB.history.filter(function(h){return isValidH(h)&&ids(fld(h,'공연')).indexOf(s.id)>-1;})
        .forEach(function(h){var pid=ids(fld(h,'참여자'))[0]||'';if(pid)memberSet[pid]=true;});
    });
    var memberCnt=Object.keys(memberSet).length;
    listH+='<div class="result-card" data-action="troupe" data-id="'+t.id+'">'
      +'<div class="result-card-ph">🏢</div>'
      +'<div class="result-card-body">'
      +'<div class="result-card-title">'+fld(t,'극단명')+'</div>'
      +'<div class="result-card-sub">공연 '+shows.length+'개</div>'
      +(memberCnt?'<div class="result-card-sub">참여자 '+memberCnt+'명</div>':'')
      +'</div></div>';
  });
  listH+='</div>';
  mn('<div class="tab-index">'+resultH+listH+'</div>');
}

function routeFromHash(hash){
  var h=hash||location.hash;
  if(!h||h==='#home'){goHome(false);return;}
  if(h==='#shows'){goShows(false);return;}
  if(h==='#people'){goPeople(false);return;}
  if(h==='#works'){goWorks(false);return;}
  if(h==='#roles'){goRoles(false);return;}
  if(h==='#venues'){goVenues(false);return;}
  if(h==='#troupes'){goTroupes(false);return;}
  var m;
  if(m=h.match(/^#show-(.+)$/)){showShow(m[1],false);return;}
  if(m=h.match(/^#person-(.+)$/)){showPerson(m[1],false);return;}
  if(m=h.match(/^#work-(.+)$/)){showWork(m[1],false);return;}
  if(m=h.match(/^#role-(.+)$/)){showRole(m[1],false);return;}
  if(m=h.match(/^#venue-(.+)$/)){showVenue(m[1],false);return;}
  if(m=h.match(/^#troupe-(.+)$/)){showTroupe(m[1],false);return;}
  goHome(false);
}
window.addEventListener('popstate',function(){routeFromHash(location.hash);});

(async function(){
  try{await load();routeFromHash(location.hash);}
  catch(e){$('mn').innerHTML='<div style="color:#e06c6c;padding:2rem">연결 실패: '+e.message+'</div>';}
})();
</script>
