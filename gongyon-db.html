<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>공연 아카이브</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&family=Noto+Sans+KR:wght@300;400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e0e10;--bg2:#17171a;--bg3:#1f1f24;
  --line:rgba(255,255,255,0.08);--muted:rgba(255,255,255,0.35);--text:rgba(255,255,255,0.88);
  --accent:#c8a96e;--actor:#6eb5c8;--actor-bg:rgba(110,181,200,0.12);
  --staff:#c8a96e;--staff-bg:rgba(200,169,110,0.12);
}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;font-weight:300;min-height:100vh}
header{padding:1.8rem 2rem 1rem;border-bottom:1px solid var(--line);display:flex;align-items:flex-end;justify-content:space-between;gap:1rem;flex-wrap:wrap}
.site-title{font-family:'Noto Serif KR',serif;font-weight:300;font-size:clamp(1.4rem,3vw,2rem);letter-spacing:0.1em;cursor:pointer}
.site-title span{display:block;font-size:0.6em;letter-spacing:0.3em;color:var(--muted);margin-bottom:0.3rem;font-family:'Noto Sans KR',sans-serif}
nav button{background:none;border:none;border-bottom:2px solid transparent;color:var(--muted);font-family:'Noto Sans KR',sans-serif;font-size:0.82rem;letter-spacing:0.08em;padding:0.4rem 1rem;cursor:pointer;transition:color .2s,border-color .2s}
nav button.active,nav button:hover{color:var(--text);border-bottom-color:var(--accent)}
.app{display:grid;grid-template-columns:240px 1fr;min-height:calc(100vh - 90px)}
aside{border-right:1px solid var(--line);padding:1.2rem 0;overflow-y:auto;max-height:calc(100vh - 90px);position:sticky;top:0}
.sidebar-label{font-size:0.68rem;letter-spacing:0.2em;color:var(--muted);padding:0 1.2rem 0.5rem;text-transform:uppercase}
.sb-search{display:flex;align-items:center;margin:0 1rem 0.6rem;background:var(--bg3);border:1px solid var(--line);border-radius:5px;padding:0.4rem 0.7rem;gap:0.4rem}
.sb-search input{background:none;border:none;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:0.82rem;outline:none;width:100%}
.sb-search input::placeholder{color:var(--muted)}
.sb-search-icon{color:var(--muted);font-size:0.85rem;flex-shrink:0}
.list-item{display:block;width:100%;text-align:left;background:none;border:none;padding:0.6rem 1.2rem;color:var(--muted);font-family:'Noto Sans KR',sans-serif;font-size:0.85rem;cursor:pointer;transition:background .15s,color .15s;border-left:2px solid transparent}
.list-item:hover{background:var(--bg2);color:var(--text)}
.list-item.active{background:var(--bg3);color:var(--text);border-left-color:var(--accent)}
.list-item .sub{display:block;font-size:0.7rem;color:var(--muted);margin-top:0.12rem}
main{padding:2rem 2.5rem;overflow-y:auto}
.eyebrow{font-size:0.7rem;letter-spacing:0.25em;color:var(--accent);text-transform:uppercase;margin-bottom:0.6rem}
.detail-title{font-family:'Noto Serif KR',serif;font-weight:300;font-size:clamp(1.4rem,3vw,2rem);letter-spacing:0.04em;line-height:1.3}
.detail-meta{font-size:0.78rem;color:var(--muted);display:flex;gap:1.2rem;flex-wrap:wrap;margin-top:0.6rem}
.detail-header{margin-bottom:2rem;padding-bottom:1.2rem;border-bottom:1px solid var(--line)}
.sec{margin-bottom:2rem}
.sec-label{font-size:0.68rem;letter-spacing:0.22em;color:var(--muted);text-transform:uppercase;margin-bottom:0.8rem;display:flex;align-items:center;gap:0.8rem}
.sec-label::after{content:'';flex:1;height:1px;background:var(--line)}
.poster-wrap{display:flex;gap:2rem;margin-bottom:2rem;align-items:flex-start}
.poster-img{width:180px;flex-shrink:0;border-radius:8px;object-fit:cover;aspect-ratio:2/3;display:block}
.poster-placeholder{width:180px;flex-shrink:0;border-radius:8px;background:var(--bg2);border:1px solid var(--line);aspect-ratio:2/3;display:flex;align-items:center;justify-content:center;font-size:2.5rem;color:var(--muted)}
.poster-info{flex:1;min-width:0}
@media(max-width:600px){.poster-wrap{flex-direction:column}.poster-img,.poster-placeholder{width:100%;max-width:180px}}
.cast-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:0.5rem;margin-bottom:1.2rem}
.cast-card{background:var(--bg2);border:1px solid var(--line);border-radius:6px;padding:0.8rem;cursor:pointer;transition:background .15s}
.cast-card:hover{background:var(--bg3)}
.cast-img{width:100%;aspect-ratio:3/4;object-fit:cover;border-radius:4px;margin-bottom:0.6rem;background:var(--bg3);display:block}
.cast-img-ph{width:100%;aspect-ratio:3/4;background:var(--bg3);border-radius:4px;margin-bottom:0.6rem;display:flex;align-items:center;justify-content:center;font-size:1.6rem;color:var(--muted)}
.cast-name{font-size:0.85rem;font-weight:400;margin-bottom:0.2rem}
.cast-role{font-size:0.72rem;color:var(--muted)}
.role-divider{font-size:0.75rem;color:var(--muted);letter-spacing:0.12em;padding:0.5rem 0 0.4rem;border-bottom:1px solid var(--line);margin-bottom:0.4rem;margin-top:0.8rem}
.role-divider:first-child{margin-top:0}
.tag{display:inline-block;font-size:0.63rem;letter-spacing:0.1em;padding:0.18rem 0.5rem;border-radius:3px;margin-right:0.3rem}
.tag-a{background:var(--actor-bg);color:var(--actor)}
.tag-s{background:var(--staff-bg);color:var(--staff)}
.stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:0.8rem;margin-bottom:2.5rem}
.stat-card{background:var(--bg2);border:1px solid var(--line);border-radius:6px;padding:1.1rem}
.stat-num{font-family:'Noto Serif KR',serif;font-size:1.8rem;font-weight:300;color:var(--accent);line-height:1;margin-bottom:0.3rem}
.stat-label{font-size:0.72rem;color:var(--muted);letter-spacing:0.08em}
.home-list{display:flex;flex-direction:column}
.home-row{display:flex;align-items:center;gap:1rem;padding:0.85rem 0;border-bottom:1px solid var(--line);cursor:pointer}
.home-row:hover .home-row-title{color:var(--accent)}
.home-row-num{font-size:0.72rem;color:var(--muted);width:1.4rem;text-align:right;flex-shrink:0}
.home-row-title{font-size:0.92rem;flex:1;transition:color .2s}
.home-row-sub{font-size:0.75rem;color:var(--muted)}
.link{color:var(--accent);cursor:pointer;border-bottom:1px solid rgba(200,169,110,0.3);transition:border-color .2s}
.link:hover{border-bottom-color:var(--accent)}
.item-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:0.8rem}
.item-card{background:var(--bg2);border:1px solid var(--line);border-radius:8px;padding:1.2rem;cursor:pointer;transition:background .15s,border-color .15s}
.item-card:hover{background:var(--bg3);border-color:rgba(255,255,255,0.15)}
.item-card-title{font-size:0.95rem;font-weight:400;margin-bottom:0.3rem}
.item-card-sub{font-size:0.75rem;color:var(--muted)}
.empty{color:var(--muted);font-size:0.83rem;padding:2rem 0}
#overlay{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999}
.api-box{max-width:440px;width:90%}
.api-title-big{font-family:'Noto Serif KR',serif;font-size:1.5rem;font-weight:300;letter-spacing:0.08em;margin-bottom:0.4rem}
.api-sub{font-size:0.68rem;letter-spacing:0.2em;color:var(--muted);margin-bottom:2rem;text-transform:uppercase}
.api-inner{background:var(--bg2);border:1px solid var(--line);border-radius:8px;padding:1.6rem}
.api-label{font-size:0.83rem;color:var(--accent);font-weight:500;margin-bottom:0.4rem}
.api-desc{font-size:0.78rem;color:var(--muted);line-height:1.7;margin-bottom:1rem}
.api-desc code{color:var(--accent);font-size:0.72rem}
.api-form{display:flex;gap:0.5rem}
.api-input{background:var(--bg3);border:1px solid var(--line);border-radius:4px;padding:0.5rem 0.8rem;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:0.8rem;flex:1;outline:none}
.api-input:focus{border-color:var(--accent)}
.api-input::placeholder{color:var(--muted)}
.btn{background:var(--accent);color:#0e0e10;border:none;border-radius:4px;padding:0.5rem 1rem;font-family:'Noto Sans KR',sans-serif;font-size:0.8rem;font-weight:500;cursor:pointer;white-space:nowrap}
.err{font-size:0.75rem;color:#e06c6c;margin-top:0.6rem;display:none}
</style>
</head>
<body>

<header>
  <div class="site-title" onclick="goHome()"><span>PERFORMANCE ARCHIVE</span>공연 아카이브</div>
  <nav>
    <button id="nav-home" class="active" onclick="goHome()">홈</button>
    <button id="nav-shows" onclick="goShows()">공연</button>
    <button id="nav-people" onclick="goPeople()">참여자</button>
    <button id="nav-works" onclick="goWorks()">작품</button>
    <button id="nav-venues" onclick="goVenues()">극장</button>
    <button id="nav-troupes" onclick="goTroupes()">극단</button>
  </nav>
</header>
<div class="app">
  <aside id="sb"></aside>
  <main id="mn"></main>
</div>
<script>
var BASE='appQtwYrSzJvmt9NA',TOKEN='patGrndUzESpEA1Dw.741c774c92d507034565c813ea223d26291c105e0a35b6282b5a2c501226e05d';
var DB={shows:[],people:[],history:[],roles:[],staffRoles:[],works:[],troupes:[],venues:[]};
var MAP={},STAFF_ORDER={},POSTER={};

function $(i){return document.getElementById(i);}
function sb(h){$('sb').innerHTML=h;}
function mn(h){$('mn').innerHTML=h;}
function fld(r,k){return(r&&r.fields&&r.fields[k]!==undefined)?r.fields[k]:null;}
function ids(v){if(!v||!Array.isArray(v))return[];return v.map(function(x){return typeof x==='string'?x:x.id;});}
function nm(id){return MAP[id]||'';}
function iurl(imgs){if(!imgs||!imgs[0])return '';return(imgs[0].thumbnails&&imgs[0].thumbnails.large)?imgs[0].thumbnails.large.url:imgs[0].url;}

async function api(t){
  var all=[],offset='';
  do {
    var url='https://api.airtable.com/v0/'+BASE+'/'+t+'?pageSize=100'+(offset?'&offset='+encodeURIComponent(offset):'');
    var r=await fetch(url,{headers:{Authorization:'Bearer '+TOKEN}});
    if(!r.ok)throw new Error(r.status);
    var data=await r.json();
    all=all.concat(data.records||[]);
    offset=data.offset||'';
  } while(offset);
  return all;
}

async function load(){
  var r=await Promise.allSettled([
    api('tblQ5oPChjABDqfsF'),api('tblOC3tLzU62ick8h'),api('tblozdPlUPzZXU2A6'),
    api('tblTdJpe7J7LGKCM9'),api('tblA3YldoCySlRh3E'),api('tblewL5MuJ0aaSwQu'),
    api('tblCg9DzicDbjJJKl'),api('tblhezC6tdH4o7xo7'),
  ]);
  DB.shows=r[0].value||[];DB.people=r[1].value||[];DB.history=r[2].value||[];
  DB.roles=r[3].value||[];DB.staffRoles=r[4].value||[];DB.works=r[5].value||[];
  DB.troupes=r[6].value||[];DB.venues=r[7].value||[];
  MAP={};
  DB.shows.forEach(function(r){MAP[r.id]=fld(r,'공연명')||'';});
  DB.people.forEach(function(r){MAP[r.id]=fld(r,'이름')||'';});
  DB.roles.forEach(function(r){MAP[r.id]=fld(r,'배역명')||'';});
  DB.staffRoles.forEach(function(r){MAP[r.id]=fld(r,'Name')||'';});
  DB.works.forEach(function(r){MAP[r.id]=fld(r,'작품명')||'';});
  DB.troupes.forEach(function(r){MAP[r.id]=fld(r,'극단명')||'';});
  DB.venues.forEach(function(r){MAP[r.id]=fld(r,'극장명')||'';});
  POSTER={};
  DB.shows.forEach(function(r){var u=iurl(fld(r,'포스터'));if(u)POSTER[r.id]=u;});
  STAFF_ORDER={};
  DB.staffRoles.forEach(function(r){var o=fld(r,'순서');if(o!=null)STAFF_ORDER[r.id]=o;});
}

function sortShows(arr){
  return arr.slice().sort(function(a,b){
    var da=fld(a,'날짜')||'',db=fld(b,'날짜')||'';
    if(!da&&!db)return 0;if(!da)return 1;if(!db)return -1;
    return db.localeCompare(da);
  });
}

function isValidH(h){
  return ids(fld(h,'참여자')).length>0;
}
function histByShow(sid){return DB.history.filter(function(h){return isValidH(h)&&ids(fld(h,'공연')).indexOf(sid)>-1;});}
function histByPerson(pid){return DB.history.filter(function(h){return isValidH(h)&&ids(fld(h,'참여자')).indexOf(pid)>-1;});}
function tname(h){var t=fld(h,'역할 타입');return t?(typeof t==='string'?t:t.name||''):'';}

function setNav(v){
  ['home','shows','people','works','venues','troupes'].forEach(function(n){
    var el=$('nav-'+n);if(el)el.classList.toggle('active',n===v);
  });
}

function actorCard(rec){
  var pid=ids(fld(rec,'참여자'))[0]||'';
  var u=iurl(fld(rec,'사진'));
  var imgH=u?'<img class="cast-img" src="'+u+'" alt="'+nm(pid)+'">':'<div class="cast-img-ph">🎭</div>';
  var rid=ids(fld(rec,'배역'))[0]||'';
  return '<div class="cast-card" onclick="showPerson(\''+pid+'\')">'+imgH+'<div class="cast-name">'+nm(pid)+'</div>'+(nm(rid)?'<div class="cast-role">'+nm(rid)+'</div>':'')+'</div>';
}

function showCard(sid){
  var u=POSTER[sid]||'';
  var imgH=u?'<img class="cast-img" src="'+u+'" alt="'+nm(sid)+'">':'<div class="cast-img-ph">🎭</div>';
  return '<div class="cast-card" onclick="showShow(\''+sid+'\')">'+imgH+'<div class="cast-name">'+nm(sid)+'</div></div>';
}

// ── 홈 ──
function goHome(){
  setNav('home');sb('');
  var shows=DB.shows.filter(function(s){return fld(s,'공연명');});
  var people=DB.people.filter(function(p){return fld(p,'이름');});
  var hist=DB.history.filter(isValidH);
  mn('<div class="stats">'+
    '<div class="stat-card"><div class="stat-num">'+shows.length+'</div><div class="stat-label">공연</div></div>'+
    '<div class="stat-card"><div class="stat-num">'+people.length+'</div><div class="stat-label">참여자</div></div>'+
    '<div class="stat-card"><div class="stat-num">'+hist.length+'</div><div class="stat-label">참여 이력</div></div>'+
    '<div class="stat-card"><div class="stat-num">'+DB.works.filter(function(w){return fld(w,'작품명');}).length+'</div><div class="stat-label">작품</div></div>'+
    '</div>'+
    '<div class="sec-label">최근 공연</div>'+
    '<div class="home-list">'+
    sortShows(shows).map(function(s,i){
      var wid=ids(fld(s,'작품'))[0]||'';
      return '<div class="home-row" onclick="showShow(\''+s.id+'\')">'+
        '<span class="home-row-num">'+String(i+1).padStart(2,'0')+'</span>'+
        '<span class="home-row-title">'+fld(s,'공연명')+'</span>'+
        '<span class="home-row-sub">'+nm(wid)+'</span></div>';
    }).join('')+'</div>');
}

// ── 공연 ──
function renderShowSidebar(shows, query){
  var q=(query||'').trim();
  var filtered=q?shows.filter(function(s){
    var name=fld(s,'공연명')||'';
    var trid=ids(fld(s,'극단'))[0]||'';
    return name.includes(q)||nm(trid).includes(q);
  }):shows;
  var items=filtered.map(function(s){
    var trid=ids(fld(s,'극단'))[0]||'';
    var sub=nm(trid)||'';
    return '<button class="list-item" onclick="showShow(\''+s.id+'\')">'+fld(s,'공연명')+(sub?'<span class="sub">'+sub+'</span>':'')+'</button>';
  }).join('');
  .innerHTML=
    '<div class="sidebar-label">공연 목록</div>'+
    '<div class="sb-search"><span class="sb-search-icon">🔍</span>'+
    '<input id="show-search" type="text" placeholder="공연명, 극단 검색..." value="'+(q||'')+'" oninput="renderShowSidebar(_allShows,this.value)"></div>'+
    (items||'<div style="padding:0.8rem 1.2rem;font-size:0.8rem;color:var(--muted)">검색 결과 없음</div>');
  if(q&&filtered[0])showShow(filtered[0].id);
  var inp=;if(inp){inp.focus();inp.setSelectionRange(inp.value.length,inp.value.length);}
}
var _allShows=[];
function goShows(){
  setNav('shows');
  _allShows=sortShows(DB.shows.filter(function(s){return fld(s,'공연명');}));
  renderShowSidebar(_allShows,'');
  if(_allShows[0])showShow(_allShows[0].id);
}

function showShow(sid){
  setNav('shows');
  document.querySelectorAll('#sb .list-item').forEach(function(el){
    el.classList.toggle('active',el.getAttribute('onclick')&&el.getAttribute('onclick').indexOf(sid)>-1);
  });
  if(!$('sb').innerHTML)goShows();
  var show=DB.shows.find(function(s){return s.id===sid;});
  if(!show)return;
  var hist=histByShow(sid);
  var actors=hist.filter(function(h){return tname(h)==='배우';});
  var staff=hist.filter(function(h){return tname(h)==='스텝';});
  var wid=ids(fld(show,'작품'))[0]||'';
  var trid=ids(fld(show,'극단'))[0]||'';
  var vid=ids(fld(show,'극장'))[0]||'';
  var date=fld(show,'날짜')||'';
  var poster=POSTER[sid]||'';
  var pH=poster?'<img class="poster-img" src="'+poster+'" alt="'+fld(show,'공연명')+'">':'<div class="poster-placeholder">🎭</div>';
  var h='<div class="detail-header"><div class="poster-wrap">'+pH+
    '<div class="poster-info">'+
    '<div class="eyebrow">'+(wid?'<span class="link" onclick="showWork(\''+wid+'\')">'+nm(wid)+'</span>':'공연')+'</div>'+
    '<div class="detail-title">'+fld(show,'공연명')+'</div>'+
    '<div class="detail-meta">'+
    (trid?'<span>🏢 <span class="link" onclick="showTroupe(\''+trid+'\')">'+nm(trid)+'</span></span>':'')+
    (vid?'<span>📍 <span class="link" onclick="showVenue(\''+vid+'\')">'+nm(vid)+'</span></span>':'')+
    (date?'<span>📅 '+date+'</span>':'')+
    '</div></div></div></div>';
  if(actors.length){
    h+='<div class="sec"><div class="sec-label">출연진</div><div class="cast-grid">';
    actors.forEach(function(rec){h+=actorCard(rec);});
    h+='</div></div>';
  }
  if(staff.length){
    var sorted=staff.slice().sort(function(a,b){
      var ra=ids(fld(a,'스텝'))[0]||'',rb=ids(fld(b,'스텝'))[0]||'';
      return(STAFF_ORDER[ra]||999)-(STAFF_ORDER[rb]||999);
    });
    h+='<div class="sec"><div class="sec-label">스텝</div><div class="cast-grid">'+
      sorted.map(function(rec){
        var pid=ids(fld(rec,'참여자'))[0]||'';
        var rid=ids(fld(rec,'스텝'))[0]||'';
        return '<div class="cast-card" onclick="showPerson(\''+pid+'\')"><div class="cast-name">'+nm(pid)+'</div><div class="cast-role" style="color:var(--staff)">'+nm(rid)+'</div></div>';
      }).join('')+'</div></div>';
  }
  if(!actors.length&&!staff.length)h+='<div class="empty">참여 이력이 없습니다.</div>';
  mn(h);
}

// ── 참여자 ──
function goPeople(){
  setNav('people');
  var people=DB.people.filter(function(p){return fld(p,'이름');});
  sb('<div class="sidebar-label">참여자 목록</div>'+
    people.map(function(p){
      return '<button class="list-item" onclick="showPerson(\''+p.id+'\')">'+fld(p,'이름')+'<span class="sub">'+histByPerson(p.id).length+'개 이력</span></button>';
    }).join(''));
  if(people[0])showPerson(people[0].id);
}

function showPerson(pid){
  setNav('people');
  document.querySelectorAll('#sb .list-item').forEach(function(el){
    el.classList.toggle('active',el.getAttribute('onclick')&&el.getAttribute('onclick').indexOf(pid)>-1);
  });
  if(!$('sb').innerHTML)goPeople();
  var person=DB.people.find(function(p){return p.id===pid;});
  if(!person)return;
  var hist=histByPerson(pid);
  var actors=hist.filter(function(h){return tname(h)==='배우';});
  var staff=hist.filter(function(h){return tname(h)==='스텝';});
  var h='<div class="detail-header"><div class="eyebrow">참여자</div>'+
    '<div class="detail-title">'+fld(person,'이름')+'</div>'+
    '<div class="detail-meta">'+
    (actors.length?'<span>🎭 배우 '+actors.length+'회</span>':'')+
    (staff.length?'<span>🎬 스텝 '+staff.length+'회</span>':'')+
    '</div></div>';
  if(actors.length){
    h+='<div class="sec"><div class="sec-label">배우로 참여한 공연</div><div class="cast-grid">';
    actors.forEach(function(rec){
      var sid=ids(fld(rec,'공연'))[0]||'';
      var rid=ids(fld(rec,'배역'))[0]||'';
      var u=POSTER[sid]||'';
      var imgH=u?'<img class="cast-img" src="'+u+'">':'<div class="cast-img-ph">🎭</div>';
      h+='<div class="cast-card" onclick="showShow(\''+sid+'\')">'+imgH+'<div class="cast-name">'+nm(sid)+'</div><div class="cast-role">'+nm(rid)+'</div></div>';
    });
    h+='</div></div>';
  }
  if(staff.length){
    h+='<div class="sec"><div class="sec-label">스텝으로 참여한 공연</div><div class="cast-grid">';
    staff.forEach(function(rec){
      var sid=ids(fld(rec,'공연'))[0]||'';
      var rid=ids(fld(rec,'스텝'))[0]||'';
      var u=POSTER[sid]||'';
      var imgH=u?'<img class="cast-img" src="'+u+'">':'<div class="cast-img-ph">🎭</div>';
      h+='<div class="cast-card" onclick="showShow(\''+sid+'\')">'+imgH+'<div class="cast-name">'+nm(sid)+'</div><div class="cast-role" style="color:var(--staff)">'+nm(rid)+'</div></div>';
    });
    h+='</div></div>';
  }
  if(!hist.length)h+='<div class="empty">참여 이력이 없습니다.</div>';
  mn(h);
}

// ── 작품 ──
function goWorks(){
  setNav('works');
  var works=DB.works.filter(function(w){return fld(w,'작품명');});
  sb('<div class="sidebar-label">작품 목록</div>'+
    works.map(function(w){
      var cnt=DB.shows.filter(function(s){return ids(fld(s,'작품')).indexOf(w.id)>-1;}).length;
      return '<button class="list-item" onclick="showWork(\''+w.id+'\')">'+fld(w,'작품명')+'<span class="sub">공연 '+cnt+'개</span></button>';
    }).join(''));
  if(works[0])showWork(works[0].id);
}

function showWork(wid){
  setNav('works');
  document.querySelectorAll('#sb .list-item').forEach(function(el){
    el.classList.toggle('active',el.getAttribute('onclick')&&el.getAttribute('onclick').indexOf(wid)>-1);
  });
  if(!$('sb').innerHTML)goWorks();
  var work=DB.works.find(function(w){return w.id===wid;});
  if(!work)return;
  var shows=sortShows(DB.shows.filter(function(s){return ids(fld(s,'작품')).indexOf(wid)>-1;}));
  var roles=DB.roles.filter(function(r){return ids(fld(r,'작품')).indexOf(wid)>-1;});
  var h='<div class="detail-header"><div class="eyebrow">작품</div>'+
    '<div class="detail-title">'+fld(work,'작품명')+'</div>'+
    (fld(work,'작품명 (영문)')?'<div class="detail-meta"><span>'+fld(work,'작품명 (영문)')+'</span></div>':'')+
    '</div>';
  if(shows.length){
    h+='<div class="sec"><div class="sec-label">공연 이력</div><div class="item-grid">'+
      shows.map(function(s){
        var p=POSTER[s.id]||'';
        return '<div class="item-card" onclick="showShow(\''+s.id+'\')">'+
          (p?'<img src="'+p+'" style="width:100%;aspect-ratio:2/3;object-fit:cover;border-radius:4px;margin-bottom:0.6rem">':'')+
          '<div class="item-card-title">'+fld(s,'공연명')+'</div>'+
          '<div class="item-card-sub">'+(fld(s,'날짜')||'')+'</div></div>';
      }).join('')+'</div></div>';
  }
  if(roles.length){
    h+='<div class="sec"><div class="sec-label">등장인물</div><div class="item-grid">'+
      roles.map(function(r){
        return '<div class="item-card" onclick="showRole(\''+r.id+'\')"><div class="item-card-title">'+fld(r,'배역명')+'</div></div>';
      }).join('')+'</div></div>';
  }
  mn(h);
}

// ── 배역 ──
function showRole(rid){
  setNav('works');
  var role=DB.roles.find(function(r){return r.id===rid;});
  if(!role)return;
  var hists=DB.history.filter(function(h){return isValidH(h)&&ids(fld(h,'배역')).indexOf(rid)>-1;});
  var h='<div class="detail-header"><div class="eyebrow">배역</div><div class="detail-title">'+fld(role,'배역명')+'</div></div>';
  if(hists.length){
    h+='<div class="sec"><div class="sec-label">이 배역을 맡은 배우</div><div class="cast-grid">';
    hists.forEach(function(rec){
      var pid=ids(fld(rec,'참여자'))[0]||'';
      var sid=ids(fld(rec,'공연'))[0]||'';
      var u=iurl(fld(rec,'사진'));
      var imgH=u?'<img class="cast-img" src="'+u+'">':'<div class="cast-img-ph">🎭</div>';
      h+='<div class="cast-card" onclick="showPerson(\''+pid+'\')">'+imgH+'<div class="cast-name">'+nm(pid)+'</div><div class="cast-role">'+nm(sid)+'</div></div>';
    });
    h+='</div></div>';
  }else{h+='<div class="empty">참여 이력이 없습니다.</div>';}
  mn(h);
}
